name: Frontend Build Check

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.js'
      - 'tailwind.config.js'

  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist output
        run: |
          ls -la dist/
          test -f dist/index.html && echo "✅ index.html exists" || exit 1
          test -f dist/manifest.json && echo "✅ manifest.json exists" || exit 1
          test -f dist/sw.js && echo "✅ sw.js exists" || exit 1
